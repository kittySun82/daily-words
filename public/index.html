<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>每日单词</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f0;
      --surface: #ffffff;
      --border: #e0e0d8;
      --accent: #3b5bdb;
      --accent-light: #eef2ff;
      --text: #1a1a2e;
      --muted: #6b7280;
      --radius: 12px;
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo { font-size: 18px; font-weight: 700; color: var(--accent); letter-spacing: -0.5px; }
    .header-actions { display: flex; gap: 8px; align-items: center; }

    /* ── Buttons ── */
    button {
      cursor: pointer;
      border: none;
      font-size: 14px;
      font-family: inherit;
      transition: all 0.15s;
    }
    .btn {
      padding: 8px 16px;
      border-radius: 8px;
      font-weight: 500;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover { background: #2f4cbf; }
    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: var(--bg); color: var(--text); }
    .btn-icon {
      width: 36px; height: 36px;
      border-radius: 8px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }
    .btn-icon.active {
      background: var(--accent-light);
      color: var(--accent);
      border-color: var(--accent);
    }
    .btn-icon:hover { background: var(--bg); }

    /* ── Main container ── */
    main { max-width: 1100px; margin: 0 auto; padding: 28px 24px; }

    /* ── Page header bar ── */
    .page-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .page-title { font-size: 22px; font-weight: 700; }
    .view-toggle { display: flex; gap: 6px; }

    /* ── Empty state ── */
    .empty {
      text-align: center;
      padding: 80px 24px;
      color: var(--muted);
    }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty h2 { font-size: 18px; font-weight: 600; margin-bottom: 6px; color: var(--text); }
    .empty p { font-size: 14px; }

    /* ── Grid view ── */
    .grid-view {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 16px;
    }
    .date-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      overflow: hidden;
    }
    .date-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.12);
    }
    .card-top {
      background: var(--accent);
      color: #fff;
      padding: 18px 16px 14px;
    }
    .card-month {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.8;
    }
    .card-day {
      font-size: 40px;
      font-weight: 800;
      line-height: 1;
      margin: 4px 0;
    }
    .card-year {
      font-size: 12px;
      opacity: 0.75;
    }
    .card-bottom {
      padding: 12px 14px;
    }
    .card-preview {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.6;
    }
    .card-preview span {
      display: block;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-count {
      font-size: 11px;
      color: var(--accent);
      font-weight: 600;
      margin-top: 6px;
    }

    /* ── List view ── */
    .list-view {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .list-row {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 20px;
      cursor: pointer;
      transition: box-shadow 0.15s;
      box-shadow: var(--shadow);
    }
    .list-row:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
    .list-date-badge {
      background: var(--accent);
      color: #fff;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 14px;
      font-weight: 700;
      white-space: nowrap;
      min-width: 110px;
      text-align: center;
    }
    .list-words {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      flex: 1;
    }
    .word-chip {
      background: var(--accent-light);
      color: var(--accent);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 13px;
      font-weight: 500;
    }
    .list-arrow { color: var(--muted); font-size: 18px; }

    /* ── Detail view ── */
    #detail-view { display: none; }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--accent);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      margin-bottom: 24px;
    }
    .back-btn:hover { opacity: 0.75; }
    .detail-date {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 24px;
    }
    .words-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }
    .word-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 22px 24px;
    }
    .word-en {
      font-size: 24px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 6px;
    }
    .word-zh {
      font-size: 16px;
      color: var(--muted);
    }
    .word-num {
      font-size: 11px;
      font-weight: 700;
      color: var(--border);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    /* ── Import modal ── */
    .overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 28px;
      width: 560px;
      max-width: 95vw;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
    .modal-sub { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
    .file-drop-zone {
      border: 2px dashed var(--border);
      border-radius: 10px;
      padding: 40px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      background: #fafafa;
    }
    .file-drop-zone:hover, .file-drop-zone.drag-over {
      border-color: var(--accent);
      background: var(--accent-light);
    }
    .file-drop-zone input[type="file"] { display: none; }
    .drop-icon { font-size: 36px; margin-bottom: 10px; }
    .drop-label { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
    .drop-sub { font-size: 13px; color: var(--muted); }
    .file-selected {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--accent-light);
      border: 1px solid var(--accent);
      border-radius: 8px;
      padding: 12px 16px;
      margin-top: 14px;
      font-size: 13px;
      color: var(--accent);
      font-weight: 500;
    }
    .file-selected .file-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .file-clear {
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 16px; padding: 0; line-height: 1;
    }
    .file-clear:hover { color: #dc2626; }
    .modal-hint {
      font-size: 12px;
      color: var(--muted);
      margin: 10px 0 18px;
      line-height: 1.6;
    }
    .modal-hint code {
      background: var(--bg);
      padding: 2px 5px;
      border-radius: 4px;
      font-family: monospace;
    }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
    .error-msg {
      color: #dc2626;
      font-size: 13px;
      margin-top: 8px;
      display: none;
    }

    /* ── Poster modal ── */
    .poster-modal { width: 500px; }
    .poster-layout {
      display: flex;
      gap: 24px;
      align-items: flex-start;
      margin-bottom: 20px;
    }
    .poster-controls { flex: 1; display: flex; flex-direction: column; gap: 12px; }
    .poster-preview-wrap {
      flex-shrink: 0;
      background: var(--bg);
      border-radius: 10px;
      padding: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #poster-canvas {
      display: block;
      border-radius: 6px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.18);
      /* displayed at half actual size */
      width: 188px;
      height: auto;
    }
    .poster-upload-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border: 1.5px dashed var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: border-color 0.15s, background 0.15s;
    }
    .poster-upload-btn:hover { border-color: var(--accent); background: var(--accent-light); color: var(--accent); }
    .poster-bg-name {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .poster-clear-bg {
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 13px; padding: 0; text-align: left;
    }
    .poster-clear-bg:hover { color: #dc2626; }
    .poster-label-row { display: flex; flex-direction: column; gap: 4px; }
    .poster-label-row label { font-size: 12px; color: var(--muted); font-weight: 500; }
    .poster-label-row input[type="text"] {
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      color: var(--text);
      background: var(--surface);
    }
    .poster-label-row input[type="text"]:focus { border-color: var(--accent); }
  </style>
</head>
<body>

<header>
  <span class="logo">📖 每日单词</span>
  <div class="header-actions">
    <button class="btn btn-primary" onclick="openImport()">＋ 导入单词</button>
  </div>
</header>

<main>
  <!-- Home view -->
  <div id="home-view">
    <div class="page-bar">
      <span class="page-title">所有日期</span>
      <div class="view-toggle">
        <button class="btn-icon active" id="btn-grid" title="Grid 视图" onclick="setView('grid')">⊞</button>
        <button class="btn-icon" id="btn-list" title="List 视图" onclick="setView('list')">☰</button>
      </div>
    </div>
    <div id="entries-container"></div>
  </div>

  <!-- Detail view -->
  <div id="detail-view">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px">
      <button class="back-btn" style="margin-bottom:0" onclick="showHome()">← 返回</button>
      <button class="btn btn-ghost" onclick="openPoster()">🖼 生成海报</button>
    </div>
    <div class="detail-date" id="detail-date-label"></div>
    <div class="words-grid" id="detail-words"></div>
  </div>
</main>

<!-- Import modal -->
<div class="overlay" id="import-overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <h2>导入单词</h2>
    <p class="modal-sub">选择或拖入 JSON / Word 文件</p>

    <div class="file-drop-zone" id="drop-zone"
         onclick="document.getElementById('file-input').click()"
         ondragover="handleDragOver(event)"
         ondragleave="handleDragLeave(event)"
         ondrop="handleDrop(event)">
      <input type="file" id="file-input" accept=".json,.docx,application/json,application/vnd.openxmlformats-officedocument.wordprocessingml.document" onchange="handleFileSelect(event)" />
      <div class="drop-icon">📂</div>
      <div class="drop-label">点击选择文件</div>
      <div class="drop-sub">支持 .json 和 .docx 格式</div>
    </div>

    <div class="file-selected" id="file-selected" style="display:none">
      <span>📄</span>
      <span class="file-name" id="file-name-label"></span>
      <button class="file-clear" onclick="clearFile(event)" title="移除">✕</button>
    </div>

    <div class="modal-hint">
      <b>JSON：</b>单个对象 <code>{}</code> 或数组 <code>[]</code>，每条含 <code>date</code>（YYYY-MM-DD）和 <code>words</code>（每个含 <code>en</code>、<code>zh</code>）。<br/>
      <b>Word：</b>每个日期作为标题，下方每行一个单词，英文和中文用空格、Tab 或横线分隔。日期无年份时自动补充当前年份。
    </div>
    <div class="error-msg" id="error-msg"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeImport()">取消</button>
      <button class="btn btn-primary" id="import-btn" onclick="importData()" disabled style="opacity:0.5;cursor:not-allowed">导入</button>
    </div>
  </div>
</div>

<!-- Poster modal -->
<div class="overlay" id="poster-overlay" onclick="handlePosterOverlayClick(event)">
  <div class="modal poster-modal">
    <h2>生成海报</h2>
    <p class="modal-sub">可自定义标题和背景图片</p>

    <div class="poster-layout">
      <!-- Controls -->
      <div class="poster-controls">
        <div class="poster-label-row">
          <label>标题文字</label>
          <input type="text" id="poster-title-input" value="Dharma English Club" oninput="renderPoster()" />
        </div>

        <div>
          <input type="file" id="poster-bg-input" accept="image/*" style="display:none" onchange="handlePosterBgSelect(event)" />
          <button class="poster-upload-btn" onclick="document.getElementById('poster-bg-input').click()">
            <span>📷</span><span>选择背景图片</span>
          </button>
          <div id="poster-bg-info" style="margin-top:8px;display:none;display:flex;align-items:center;gap:6px">
            <span class="poster-bg-name" id="poster-bg-name"></span>
            <button class="poster-clear-bg" onclick="clearPosterBg()">✕ 移除</button>
          </div>
        </div>

        <div class="poster-label-row">
          <label>文字颜色</label>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            <button class="btn btn-ghost" style="padding:6px 10px;font-size:12px" onclick="setPosterTheme('light')">浅色文字</button>
            <button class="btn btn-ghost" style="padding:6px 10px;font-size:12px" onclick="setPosterTheme('dark')">深色文字</button>
          </div>
        </div>
      </div>

      <!-- Canvas preview -->
      <div class="poster-preview-wrap">
        <canvas id="poster-canvas"></canvas>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closePoster()">关闭</button>
      <button class="btn btn-primary" onclick="downloadPoster()">⬇ 下载海报</button>
    </div>
  </div>
</div>

<script>
  const STORAGE_KEY = 'daily_words_v1';
  let currentView = 'grid';

  // ── Storage ──────────────────────────────────────────────
  function loadEntries() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch { return []; }
  }
  function saveEntries(entries) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
  }


  // ── View toggle ──────────────────────────────────────────
  function setView(v) {
    currentView = v;
    document.getElementById('btn-grid').classList.toggle('active', v === 'grid');
    document.getElementById('btn-list').classList.toggle('active', v === 'list');
    renderEntries();
  }

  // ── Render ───────────────────────────────────────────────
  function renderEntries() {
    const entries = loadEntries();
    const container = document.getElementById('entries-container');

    if (entries.length === 0) {
      container.innerHTML = `
        <div class="empty">
          <div class="empty-icon">📝</div>
          <h2>还没有单词数据</h2>
          <p>点击右上角「导入单词」开始添加</p>
        </div>`;
      return;
    }

    entries.sort((a, b) => a.date.localeCompare(b.date));

    if (currentView === 'grid') {
      container.className = 'grid-view';
      container.innerHTML = entries.map(e => {
        const d = parseDateLabel(e.date);
        const preview = e.words.slice(0, 1).map(w =>
          `<span>${w.en} · ${w.zh}</span>`).join('');
        return `
          <div class="date-card" onclick="showDetail('${e.date}')">
            <div class="card-top">
              <div class="card-month">${d.month}</div>
              <div class="card-day">${d.day}</div>
              <div class="card-year">${d.year}</div>
            </div>
            <div class="card-bottom">
              <div class="card-preview">${preview}</div>
              <div class="card-count">${e.words.length} 个单词</div>
            </div>
          </div>`;
      }).join('');
    } else {
      container.className = 'list-view';
      container.innerHTML = entries.map(e => {
        const chips = e.words.map(w =>
          `<span class="word-chip">${w.en}</span>`).join('');
        return `
          <div class="list-row" onclick="showDetail('${e.date}')">
            <div class="list-date-badge">${e.date}</div>
            <div class="list-words">${chips}</div>
            <span class="list-arrow">›</span>
          </div>`;
      }).join('');
    }
  }

  function parseDateLabel(dateStr) {
    const [year, month, day] = dateStr.split('-');
    const months = ['Jan','Feb','Mar','Apr','May','Jun',
                    'Jul','Aug','Sep','Oct','Nov','Dec'];
    return { year, month: months[parseInt(month) - 1], day: parseInt(day) };
  }

  // ── Detail ───────────────────────────────────────────────
  function showDetail(date) {
    const entries = loadEntries();
    const entry = entries.find(e => e.date === date);
    if (!entry) return;

    document.getElementById('home-view').style.display = 'none';
    document.getElementById('detail-view').style.display = 'block';
    document.getElementById('detail-date-label').textContent = entry.date;

    document.getElementById('detail-words').innerHTML = entry.words.map((w, i) => `
      <div class="word-card">
        <div class="word-num">WORD ${i + 1}</div>
        <div class="word-en">${w.en}</div>
        <div class="word-zh">${w.zh}</div>
      </div>`).join('');
  }

  function showHome() {
    document.getElementById('detail-view').style.display = 'none';
    document.getElementById('home-view').style.display = 'block';
  }

  // ── Docx parsing ─────────────────────────────────────────

  function normalizeDate(raw) {
    const y = new Date().getFullYear();
    raw = raw.trim();

    // YYYY-MM-DD
    if (/^\d{4}-\d{2}-\d{2}$/.test(raw)) return raw;
    // YYYY/MM/DD
    if (/^\d{4}\/\d{1,2}\/\d{1,2}$/.test(raw)) {
      const [yr, m, d] = raw.split('/');
      return `${yr}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
    }
    // MM-DD or M-D (no year)
    if (/^\d{1,2}-\d{1,2}$/.test(raw)) {
      const [m, d] = raw.split('-');
      return `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
    }
    // MM/DD
    if (/^\d{1,2}\/\d{1,2}$/.test(raw)) {
      const [m, d] = raw.split('/');
      return `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
    }
    // Chinese: [YYYY年]M月D日
    const cn = raw.match(/(?:(\d{4})年)?(\d{1,2})月(\d{1,2})日/);
    if (cn) {
      return `${cn[1]||y}-${cn[2].padStart(2,'0')}-${cn[3].padStart(2,'0')}`;
    }
    // English month: "January 15" or "January 15, 2024"
    const enMonths = ['january','february','march','april','may','june',
                      'july','august','september','october','november','december'];
    const en = raw.toLowerCase().match(/^(\w+)\s+(\d{1,2})(?:[,\s]+(\d{4}))?$/);
    if (en) {
      const mi = enMonths.indexOf(en[1]);
      if (mi >= 0) return `${en[3]||y}-${String(mi+1).padStart(2,'0')}-${en[2].padStart(2,'0')}`;
    }
    return null;
  }

  function isDateLine(line) {
    return (
      /^\d{4}[-\/]\d{1,2}[-\/]\d{1,2}$/.test(line) ||
      /^\d{1,2}[-\/]\d{1,2}$/.test(line) ||
      /(?:\d{4}年)?\d{1,2}月\d{1,2}日/.test(line) ||
      /^(?:january|february|march|april|may|june|july|august|september|october|november|december)\s+\d/i.test(line)
    );
  }

  function splitWordTranslation(line) {
    // Tab
    if (line.includes('\t')) {
      const parts = line.split('\t').map(s => s.trim()).filter(Boolean);
      if (parts.length >= 2) return { en: parts[0], zh: parts[1] };
    }
    // " - " or " – "
    const dashMatch = line.match(/^([^-–]+?)\s*[-–]\s*(.+)$/);
    if (dashMatch && /^[a-zA-Z]/.test(dashMatch[1].trim())) {
      return { en: dashMatch[1].trim(), zh: dashMatch[2].trim() };
    }
    // ASCII→CJK boundary
    const cjk = line.match(/^([a-zA-Z][a-zA-Z\s''-]*?)\s+([一-鿿㐀-䶿].*)$/);
    if (cjk) return { en: cjk[1].trim(), zh: cjk[2].trim() };
    // Two or more spaces
    const spaces = line.match(/^(\S+)\s{2,}(.+)$/);
    if (spaces) return { en: spaces[1].trim(), zh: spaces[2].trim() };
    return null;
  }

  function parseDocxText(text) {
    const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
    const entries = [];
    let currentDate = null;
    let currentWords = [];

    for (const line of lines) {
      if (isDateLine(line)) {
        if (currentDate && currentWords.length > 0) {
          entries.push({ date: currentDate, words: currentWords });
        }
        currentDate = normalizeDate(line);
        currentWords = [];
      } else if (currentDate) {
        const pair = splitWordTranslation(line);
        if (pair) currentWords.push(pair);
      }
    }
    if (currentDate && currentWords.length > 0) {
      entries.push({ date: currentDate, words: currentWords });
    }
    return entries;
  }

  // ── Import modal ─────────────────────────────────────────
  let pendingItems = null;

  function openImport() {
    document.getElementById('import-overlay').classList.add('open');
    pendingItems = null;
    document.getElementById('file-input').value = '';
    document.getElementById('file-selected').style.display = 'none';
    const btn = document.getElementById('import-btn');
    btn.disabled = true; btn.style.opacity = '0.5'; btn.style.cursor = 'not-allowed';
    hideError();
  }
  function closeImport() {
    document.getElementById('import-overlay').classList.remove('open');
  }
  function handleOverlayClick(e) {
    if (e.target === document.getElementById('import-overlay')) closeImport();
  }
  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.style.display = 'block';
  }
  function hideError() {
    document.getElementById('error-msg').style.display = 'none';
  }

  function setFileReady(name, items) {
    pendingItems = items;
    document.getElementById('file-name-label').textContent = `${name}（解析到 ${items.length} 条记录）`;
    document.getElementById('file-selected').style.display = 'flex';
    const btn = document.getElementById('import-btn');
    btn.disabled = false; btn.style.opacity = '1'; btn.style.cursor = 'pointer';
    hideError();
  }

  function clearFile(e) {
    e.stopPropagation();
    pendingItems = null;
    document.getElementById('file-input').value = '';
    document.getElementById('file-selected').style.display = 'none';
    const btn = document.getElementById('import-btn');
    btn.disabled = true; btn.style.opacity = '0.5'; btn.style.cursor = 'not-allowed';
    hideError();
  }

  function readFile(file) {
    if (!file) return;
    const isJson = file.name.endsWith('.json');
    const isDocx = file.name.endsWith('.docx');
    if (!isJson && !isDocx) { showError('请选择 .json 或 .docx 文件'); return; }

    if (isJson) {
      const reader = new FileReader();
      reader.onload = (ev) => {
        let parsed;
        try { parsed = JSON.parse(ev.target.result); }
        catch (e) { showError('JSON 格式错误：' + e.message); return; }
        const items = Array.isArray(parsed) ? parsed : [parsed];
        setFileReady(file.name, items);
      };
      reader.onerror = () => showError('文件读取失败');
      reader.readAsText(file, 'UTF-8');
    } else {
      // docx via mammoth
      const reader = new FileReader();
      reader.onload = async (ev) => {
        try {
          const result = await mammoth.extractRawValue({ arrayBuffer: ev.target.result });
          const items = parseDocxText(result.value);
          if (items.length === 0) { showError('未能从文档中解析到任何单词记录，请检查格式'); return; }
          setFileReady(file.name, items);
        } catch (e) { showError('Word 文件解析失败：' + e.message); }
      };
      reader.onerror = () => showError('文件读取失败');
      reader.readAsArrayBuffer(file);
    }
  }

  function handleFileSelect(e) { readFile(e.target.files[0]); }
  function handleDragOver(e) {
    e.preventDefault();
    document.getElementById('drop-zone').classList.add('drag-over');
  }
  function handleDragLeave() {
    document.getElementById('drop-zone').classList.remove('drag-over');
  }
  function handleDrop(e) {
    e.preventDefault();
    document.getElementById('drop-zone').classList.remove('drag-over');
    readFile(e.dataTransfer.files[0]);
  }

  function validateItems(items) {
    for (let i = 0; i < items.length; i++) {
      const item = items[i];
      if (!item.date || !/^\d{4}-\d{2}-\d{2}$/.test(item.date)) {
        return `第 ${i+1} 条：date 格式应为 YYYY-MM-DD（当前值：${item.date}）`;
      }
      if (!Array.isArray(item.words) || item.words.length === 0) {
        return `第 ${i+1} 条：words 为空`;
      }
      for (let j = 0; j < item.words.length; j++) {
        const w = item.words[j];
        if (!w.en || !w.zh) return `第 ${i+1} 条 words[${j}]：缺少 en 或 zh`;
      }
    }
    return null;
  }

  function importData() {
    hideError();
    if (!pendingItems) { showError('请先选择文件'); return; }

    const err = validateItems(pendingItems);
    if (err) { showError(err); return; }

    saveEntries(pendingItems); // overwrite all

    closeImport();
    renderEntries();
  }

  // ── Poster ───────────────────────────────────────────────
  const PW = 750, PH = 1360; // 2× retina (displayed at half)
  const IMG_H = 580;         // image section height (px in actual canvas)
  let posterEntry = null;
  let posterBgImg = null;      // user-uploaded override
  let defaultBgImg = null;     // loaded from bg.png
  let logoImg = null;          // loaded from logo.png
  let posterTextTheme = 'light';

  // Pre-load default background and logo
  (function() {
    const bg = new Image();
    bg.onload = () => { defaultBgImg = bg; };
    bg.src = 'bg.png';

    const logo = new Image();
    logo.onload = () => { logoImg = logo; };
    logo.src = 'logo.png';
  })();

  function openPoster() {
    const dateLabel = document.getElementById('detail-date-label').textContent;
    posterEntry = loadEntries().find(e => e.date === dateLabel);
    if (!posterEntry) return;
    document.getElementById('poster-overlay').classList.add('open');
    renderPoster();
  }
  function closePoster() {
    document.getElementById('poster-overlay').classList.remove('open');
  }
  function handlePosterOverlayClick(e) {
    if (e.target === document.getElementById('poster-overlay')) closePoster();
  }
  function setPosterTheme(t) {
    posterTextTheme = t;
    renderPoster();
  }
  function handlePosterBgSelect(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const img = new Image();
      img.onload = () => {
        posterBgImg = img;
        document.getElementById('poster-bg-name').textContent = file.name;
        document.getElementById('poster-bg-info').style.display = 'flex';
        renderPoster();
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  }
  function clearPosterBg() {
    posterBgImg = null;
    document.getElementById('poster-bg-input').value = '';
    document.getElementById('poster-bg-info').style.display = 'none';
    renderPoster();
  }

  function renderPoster() {
    if (!posterEntry) return;
    const canvas = document.getElementById('poster-canvas');
    canvas.width = PW;
    canvas.height = PH;
    const ctx = canvas.getContext('2d');

    // ── Image section ──
    const activeBg = posterBgImg || defaultBgImg;
    if (activeBg) {
      const scale = Math.max(PW / activeBg.width, IMG_H / activeBg.height);
      const sw = PW / scale, sh = IMG_H / scale;
      const sx = (activeBg.width - sw) / 2, sy = (activeBg.height - sh) / 2;
      ctx.drawImage(activeBg, sx, sy, sw, sh, 0, 0, PW, IMG_H);
    } else {
      const gr = ctx.createLinearGradient(0, 0, 0, IMG_H);
      gr.addColorStop(0, '#6a8fae');
      gr.addColorStop(1, '#2d4a6e');
      ctx.fillStyle = gr;
      ctx.fillRect(0, 0, PW, IMG_H);
    }

    // Gradient overlay at bottom of image
    const fadeGr = ctx.createLinearGradient(0, IMG_H - 200, 0, IMG_H);
    fadeGr.addColorStop(0, 'rgba(0,0,0,0)');
    fadeGr.addColorStop(1, 'rgba(0,0,0,0.52)');
    ctx.fillStyle = fadeGr;
    ctx.fillRect(0, IMG_H - 200, PW, 200);

    // Top-left: org/title text
    const titleText = document.getElementById('poster-title-input').value || '每日单词';
    const imgTextColor = posterTextTheme === 'dark' ? 'rgba(20,20,20,0.85)' : 'rgba(255,255,255,0.88)';
    ctx.fillStyle = imgTextColor;
    ctx.font = '500 26px "PingFang SC", "Microsoft YaHei", sans-serif';
    ctx.fillText(titleText, 40, 52);

    // Date at bottom of image
    const dateObj = new Date(posterEntry.date + 'T12:00:00');
    const days = ['周日/Sun','周一/Mon','周二/Tue','周三/Wed','周四/Thu','周五/Fri','周六/Sat'];
    const dayStr = `${dateObj.getFullYear()} ${days[dateObj.getDay()]}。`;
    const mmdd = `${String(dateObj.getMonth()+1).padStart(2,'0')}/${String(dateObj.getDate()).padStart(2,'0')}`;

    ctx.fillStyle = 'rgba(255,255,255,0.78)';
    ctx.font = '300 26px "PingFang SC", "Microsoft YaHei", sans-serif';
    ctx.fillText(dayStr, 40, IMG_H - 86);

    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 90px "PingFang SC", "Microsoft YaHei", sans-serif';
    ctx.fillText(mmdd, 40, IMG_H - 10);

    // ── Cream section ──
    ctx.fillStyle = '#f0ebe0';
    ctx.fillRect(0, IMG_H, PW, PH - IMG_H);

    // Words
    const wordAreaH = PH - IMG_H;
    const perWord = Math.floor(wordAreaH / (posterEntry.words.length + 0.5));
    let wy = IMG_H + Math.floor(perWord * 0.45);

    for (const word of posterEntry.words) {
      ctx.fillStyle = '#1a1a2e';
      ctx.font = 'bold 38px "PingFang SC", "Microsoft YaHei", sans-serif';
      ctx.fillText(word.en, 48, wy);
      wy += 46;
      ctx.fillStyle = '#6b7280';
      ctx.font = '300 30px "PingFang SC", "Microsoft YaHei", sans-serif';
      ctx.fillText(word.zh, 48, wy);
      wy += perWord - 46;
    }

    // ── Logo bottom-right ──
    if (logoImg) {
      const logoH = 80;
      const logoW = Math.round(logoImg.width * (logoH / logoImg.height));
      const margin = 36;
      ctx.drawImage(logoImg, PW - logoW - margin, PH - logoH - margin, logoW, logoH);
    }
  }

  function downloadPoster() {
    if (!posterEntry) return;
    const canvas = document.getElementById('poster-canvas');
    const link = document.createElement('a');
    link.download = `poster-${posterEntry.date}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  }

  // ── Init ─────────────────────────────────────────────────
  renderEntries();
</script>
</body>
</html>
